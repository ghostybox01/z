name: Build desktop binaries

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller bcrypt dnspython requests pywebview

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --onefile \
            --name synthtel-sender \
            --add-data "core;core" \
            --add-data "index.html;." \
            --add-data "libs;libs" \
            --hidden-import bcrypt \
            --hidden-import dns.resolver \
            --hidden-import webview.platforms.edgechromium \
            --collect-submodules core \
            --collect-all webview \
            desktop.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: synthtel-sender-windows
          path: dist/synthtel-sender.exe
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/synthtel-sender.exe

  build-macos:
    name: Build macOS .dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller bcrypt dnspython requests "pywebview[cocoa]"

      - name: Build with PyInstaller
        run: |
          pyinstaller \
            --noconfirm \
            --windowed \
            --name "SynthTel Sender" \
            --add-data "core:core" \
            --add-data "index.html:." \
            --add-data "libs:libs" \
            --hidden-import bcrypt \
            --hidden-import dns.resolver \
            --hidden-import webview.platforms.cocoa \
            --collect-submodules core \
            --collect-all webview \
            desktop.py

      - name: Package .app into .dmg
        run: |
          mkdir -p dmg-staging
          cp -R "dist/SynthTel Sender.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create \
            -volname "SynthTel Sender" \
            -srcfolder dmg-staging \
            -ov \
            -format UDZO \
            "dist/SynthTel-Sender.dmg"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: synthtel-sender-macos
          path: dist/SynthTel-Sender.dmg
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SynthTel-Sender.dmg
